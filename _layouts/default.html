<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#top">Disney Min-Maxing</a>
        <nav class="topnav" aria-label="Primary">
          <a href="#strategy">Strategy</a>
          <a href="#parks">Parks</a>
          <a href="#links">Links</a>
        </nav>
      </header>

      <main id="top">
        {{ content }}
      </main>

      <footer class="footer">
        <p>Built for GitHub Pages with Jekyll. Re-check the official Tokyo Disney Resort app on your visit date, since passes, shows, and ride availability can change.</p>
      </footer>
    </div>
  </body>
</html>
